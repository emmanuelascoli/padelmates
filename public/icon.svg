  <!-- Cordage horizontal -->
  <line x1="148" y1="175" x2="348" y2="175" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <line x1="140" y1="210" x2="356" y2="210" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <line x1="148" y1="245" x2="348" y2="245" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.6"/>

  <!-- Cordage vertical -->
