  <line x1="248" y1="80" x2="248" y2="340" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <line x1="286" y1="83" x2="286" y2="337" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.6"/>

